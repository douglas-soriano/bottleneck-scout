<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Business Bottlenecks Finder{% endblock %}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#1a1a2e;line-height:1.55;font-size:15px}
a{color:#2563eb;text-decoration:none}
a:hover{text-decoration:underline}

header{background:#1e293b;padding:.85rem 0;margin-bottom:2rem;border-bottom:3px solid #3b82f6}
header .inner{max-width:960px;margin:0 auto;padding:0 1.25rem;display:flex;align-items:center;gap:1rem}
header a.brand{color:#f1f5f9;font-size:1.1rem;font-weight:700;letter-spacing:-.02em;text-decoration:none}
header a.brand:hover{color:#93c5fd;text-decoration:none}
header .brand-sub{color:#64748b;font-size:.8rem;margin-top:.1rem}

.container{max-width:960px;margin:0 auto;padding:0 1.25rem 3rem}

.card{background:#fff;border-radius:10px;padding:1.5rem;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:1rem}
.card-sm{padding:1rem}

h1{font-size:1.5rem;font-weight:700;margin-bottom:1.25rem;color:#0f172a}
h2{font-size:1.2rem;font-weight:600;margin-bottom:1rem;color:#0f172a}
h3{font-size:1rem;font-weight:600;margin-bottom:.5rem}

.breadcrumb{font-size:.83rem;color:#64748b;margin-bottom:1.5rem}
.breadcrumb a{color:#2563eb}

.btn{display:inline-flex;align-items:center;padding:.45rem .9rem;border-radius:7px;border:none;cursor:pointer;font-size:.83rem;font-weight:500;transition:background .15s;text-decoration:none;line-height:1.4}
.btn:hover{text-decoration:none}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8;color:#fff}
.btn-danger{background:#dc2626;color:#fff}
.btn-danger:hover{background:#b91c1c;color:#fff}
.btn-ghost{background:#e2e8f0;color:#334155}
.btn-ghost:hover{background:#cbd5e1;color:#1e293b}
.btn-sm{padding:.3rem .65rem;font-size:.78rem}
.btn-warn{background:#d97706;color:#fff}
.btn-warn:hover{background:#b45309;color:#fff}

.form-group{margin-bottom:.9rem}
label{display:block;font-size:.83rem;font-weight:500;color:#374151;margin-bottom:.3rem}
input[type=text],input[type=url],textarea{width:100%;padding:.5rem .75rem;border:1px solid #d1d5db;border-radius:7px;font-size:.875rem;font-family:inherit;transition:border .15s}
input[type=text]:focus,input[type=url]:focus,textarea:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.12)}
textarea{resize:vertical;min-height:90px}

.badge{display:inline-flex;align-items:center;padding:.2rem .55rem;border-radius:5px;font-size:.73rem;font-weight:600;letter-spacing:.02em}
.badge-queued{background:#fef9c3;color:#854d0e}
.badge-processing{background:#dbeafe;color:#1e40af}
.badge-completed{background:#dcfce7;color:#166534}
.badge-failed{background:#fee2e2;color:#991b1b}
.badge-waiting_manual_transcript{background:#ede9fe;color:#5b21b6}
.badge-ignored{background:#f1f5f9;color:#64748b}

.sev{display:inline-block;padding:.1rem .4rem;border-radius:4px;font-size:.75rem;font-weight:700}
.sev-1{background:#dcfce7;color:#166534}
.sev-2{background:#fef9c3;color:#854d0e}
.sev-3{background:#ffedd5;color:#9a3412}
.sev-4{background:#fee2e2;color:#991b1b}
.sev-5{background:#fce7f3;color:#9d174d}

.conf{display:inline-block;font-size:.73rem;color:#64748b}
.conf-high{color:#166534;font-weight:600}
.conf-medium{color:#854d0e}
.conf-low{color:#64748b}

table{width:100%;border-collapse:collapse}
th{text-align:left;padding:.65rem .75rem;font-size:.75rem;text-transform:uppercase;letter-spacing:.04em;color:#64748b;border-bottom:2px solid #e2e8f0;white-space:nowrap}
td{padding:.7rem .75rem;border-bottom:1px solid #f1f5f9;font-size:.85rem;vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbfc}

.row{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.spacer{flex:1}
.section-header{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem}
.section-header h2{margin-bottom:0}

.pain-card{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:1rem 1.1rem;margin-bottom:.65rem}
.pain-card:hover{border-color:#93c5fd}
.pain-meta{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-top:.5rem}
.pain-quote{font-style:italic;color:#374151;font-size:.85rem;margin:.5rem 0;border-left:3px solid #e2e8f0;padding-left:.75rem}
.pain-opportunity{font-size:.82rem;color:#4f46e5;margin-top:.4rem}

.rank-num{font-size:1.3rem;font-weight:800;color:#94a3b8;min-width:2rem;text-align:right}
.count-badge{display:inline-flex;align-items:center;gap:.25rem;background:#f1f5f9;border-radius:5px;padding:.15rem .5rem;font-size:.78rem;color:#475569;font-weight:500}

.empty{text-align:center;padding:3rem 1rem;color:#94a3b8;font-size:.9rem}

.alert{padding:.75rem 1rem;border-radius:7px;margin-bottom:1rem;font-size:.875rem}
.alert-info{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}
.alert-warn{background:#fffbeb;border:1px solid #fde68a;color:#92400e}

.ts-link{font-size:.78rem;color:#2563eb;font-weight:500}
</style>
</head>
<body>
<header>
  <div class="inner">
    <div>
      <a href="/" class="brand">Business Bottlenecks Finder</a>
      <div class="brand-sub">Pesquisa de gargalos de mercado via Gemini</div>
    </div>
  </div>
</header>
<div class="container">
  {% block content %}{% endblock %}
</div>
<script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
